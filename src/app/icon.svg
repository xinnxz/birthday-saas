<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d48a97"/>
      <stop offset="100%" style="stop-color:#a85d68"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#fdf2f4;stop-opacity:0.9"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Gift box body -->
  <rect x="116" y="240" width="280" height="180" rx="24" fill="url(#ribbon)" opacity="0.95"/>
  <!-- Gift box lid -->
  <rect x="96" y="196" width="320" height="64" rx="16" fill="url(#ribbon)"/>
  <!-- Vertical ribbon -->
  <rect x="236" y="196" width="40" height="224" rx="4" fill="#d48a97" opacity="0.7"/>
  <!-- Horizontal ribbon -->
  <rect x="96" y="212" width="320" height="32" rx="4" fill="#d48a97" opacity="0.5"/>
  <!-- Bow left -->
  <ellipse cx="220" cy="180" rx="48" ry="36" fill="#d48a97" transform="rotate(-20 220 180)"/>
  <!-- Bow right -->
  <ellipse cx="292" cy="180" rx="48" ry="36" fill="#a85d68" transform="rotate(20 292 180)"/>
  <!-- Bow center -->
  <circle cx="256" cy="190" r="16" fill="#fff" opacity="0.9"/>
  <!-- Heart on gift -->
  <path d="M256 340 C256 340, 220 300, 220 280 C220 265, 235 255, 248 265 L256 275 L264 265 C277 255, 292 265, 292 280 C292 300, 256 340, 256 340Z" fill="#d48a97" opacity="0.6"/>
</svg>
